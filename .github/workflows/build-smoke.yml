name: Build Smoke Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify web output exists
        run: test -f apps/web/out/index.html

      - name: Start server and check health
        run: |
          pnpm start &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:4070/api/health && break
            sleep 1
          done

          # Verify frontend is served (not 404)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4070/)
          kill $SERVER_PID

          if [ "$STATUS" != "200" ]; then
            echo "FAIL: localhost:4070 returned $STATUS instead of 200"
            exit 1
          fi
          echo "OK: frontend served with status $STATUS"
