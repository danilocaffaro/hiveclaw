<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HiveClaw Connect</title>
  <meta name="description" content="Remote access to your HiveClaw instance">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
    .connect-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px}
    .connect-view h1{font-size:24px;margin-bottom:8px;color:#f0a030}
    .connect-view p{color:#888;margin-bottom:24px;font-size:14px}
    .connect-view input{width:100%;max-width:400px;padding:12px;margin-bottom:12px;border:1px solid #333;border-radius:8px;background:#16213e;color:#e0e0e0;font-size:14px}
    .connect-view input::placeholder{color:#666}
    .connect-view button{width:100%;max-width:400px;padding:14px;border:none;border-radius:8px;background:#f0a030;color:#1a1a2e;font-size:16px;font-weight:600;cursor:pointer}
    .connect-view button:disabled{opacity:0.5;cursor:not-allowed}
    .error{color:#ff4444;font-size:13px;margin-top:8px;display:none;max-width:400px;text-align:center}
    .chat-view{display:none;flex-direction:column;height:100vh}
    .chat-header{padding:12px 16px;background:#16213e;border-bottom:1px solid #333;display:flex;align-items:center;gap:8px}
    .chat-header .dot{width:8px;height:8px;border-radius:50%;background:#4caf50}
    .chat-header .title{font-weight:600;color:#f0a030}
    .chat-header .status{font-size:12px;color:#888;margin-left:auto}
    .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
    .msg{padding:10px 14px;border-radius:12px;max-width:80%;font-size:14px;line-height:1.5;word-wrap:break-word}
    .msg.user{background:#2563eb;color:white;align-self:flex-end;border-bottom-right-radius:4px}
    .msg.assistant{background:#3a2a10;color:#f0d090;align-self:flex-start;border-bottom-left-radius:4px}
    .msg.system{background:transparent;color:#666;align-self:center;font-size:12px;padding:4px 8px}
    .input-bar{padding:12px;background:#16213e;border-top:1px solid #333;display:flex;gap:8px}
    .input-bar input{flex:1;padding:10px 14px;border:1px solid #333;border-radius:20px;background:#1a1a2e;color:#e0e0e0;font-size:14px;outline:none}
    .input-bar input:focus{border-color:#f0a030}
    .input-bar button{padding:10px 16px;border:none;border-radius:20px;background:#f0a030;color:#1a1a2e;font-weight:600;cursor:pointer}
    .log{position:fixed;bottom:0;left:0;right:0;max-height:120px;overflow-y:auto;background:rgba(0,0,0,0.9);color:#4caf50;font-family:monospace;font-size:11px;padding:8px;display:none;z-index:100}
  </style>
</head>
<body>
  <div class="connect-view" id="connectView">
    <h1>🐝 HiveClaw Connect</h1>
    <p>Connect to your HiveClaw instance remotely</p>
    <input type="text" id="token" placeholder="Paste your Instance Token (HCW-...)" autocomplete="off">
    <input type="text" id="name" placeholder="Your name" value="">
    <button id="connectBtn" onclick="doConnect()">🔗 Connect</button>
    <div class="error" id="error"></div>
  </div>

  <div class="chat-view" id="chatView">
    <div class="chat-header">
      <div class="dot" id="statusDot"></div>
      <span class="title">HiveClaw</span>
      <span class="status" id="statusText">Connected</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

  <div class="log" id="log"></div>

  <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <script src="https://unpkg.com/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <script src="https://unpkg.com/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script>
    let client=null, instanceId='', deviceId='', userName='', myKeys=null, serverPubKey=null, sessionId=null;
    const DEBUG=location.search.includes('debug');

    function dlog(m){if(DEBUG){const el=document.getElementById('log');el.style.display='block';el.textContent+=new Date().toLocaleTimeString()+' '+m+'\n';el.scrollTop=el.scrollHeight}console.log('[Connect]',m)}
    function showError(m){const e=document.getElementById('error');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',8000)}
    function addMessage(t,type){const m=document.getElementById('messages'),d=document.createElement('div');d.className='msg '+type;d.textContent=t;m.appendChild(d);m.scrollTop=m.scrollHeight}

    function decodeToken(t){
      try{
        // Remove HCW- prefix and all dashes
        let body=t.replace(/^HCW-/,'').replace(/-/g,'');
        // Last 4 chars are checksum — remove them
        body=body.slice(0,-4);
        const json=atob(body);
        const d=JSON.parse(json);
        dlog('Token decoded: instance='+d.i+' broker='+d.b);
        return{instanceId:d.i, broker:d.b, username:d.u||'', password:d.p||'', uid:d.uid||'', role:d.r||'member'}
      }catch(e){
        dlog('Token decode FAILED: '+e.message);
        return null;
      }
    }

    function doConnect(){
      const token=document.getElementById('token').value.trim();
      const name=document.getElementById('name').value.trim();
      if(!token)return showError('Instance Token is required');
      if(!name)return showError('Your name is required');

      const config=decodeToken(token);
      if(!config)return showError('Invalid token format');

      userName=name;
      deviceId='dev_'+Math.random().toString(36).substr(2,8);
      instanceId=config.instanceId;
      myKeys=nacl.box.keyPair();

      const btn=document.getElementById('connectBtn');
      btn.disabled=true; btn.textContent='Connecting...';

      const opts={clientId:deviceId, clean:true, connectTimeout:10000};
      if(config.username){opts.username=config.username; opts.password=config.password}

      dlog('Connecting to '+config.broker+' as '+deviceId);

      try{
        client=mqtt.connect(config.broker, opts);
      }catch(e){
        showError('Connection failed: '+e.message);
        btn.disabled=false; btn.textContent='🔗 Connect';
        return;
      }

      client.on('connect',()=>{
        dlog('MQTT connected! Subscribing to '+instanceId+'/'+deviceId+'/agent');
        // Subscribe to agent responses
        client.subscribe(instanceId+'/'+deviceId+'/agent');
        // Send pairing request
        const pairPayload={
          token: token,
          deviceName: userName,
          publicKey: nacl.util.encodeBase64(myKeys.publicKey),
          userAgent: navigator.userAgent
        };
        dlog('Publishing auth to '+instanceId+'/auth');
        client.publish(instanceId+'/auth', JSON.stringify(pairPayload));
        // Show chat
        document.getElementById('connectView').style.display='none';
        document.getElementById('chatView').style.display='flex';
        addMessage('Connected to HiveClaw ✓','system');
      });

      client.on('message',(topic,payload)=>{
        try{
          const data=JSON.parse(payload.toString());
          dlog('MSG type='+data.type+' on '+topic);

          if(data.type==='auth_response'){
            if(data.payload && data.payload.serverPublicKey){
              serverPubKey=nacl.util.decodeBase64(data.payload.serverPublicKey);
              dlog('Got server public key');
            }
            if(data.payload && data.payload.device && data.payload.device.id){
              deviceId=data.payload.device.id;
              dlog('Device ID updated to '+deviceId);
              // Resubscribe with correct device ID
              client.subscribe(instanceId+'/'+deviceId+'/agent');
            }
            addMessage('Paired successfully 🔒','system');
          }
          else if(data.type==='chat'){
            const content=(data.payload && data.payload.content) || data.content || JSON.stringify(data.payload);
            if(data.payload && data.payload.sessionId) sessionId=data.payload.sessionId;
            addMessage(content,'assistant');
          }
          else if(data.type==='error'){
            addMessage('Error: '+(data.payload&&data.payload.message||'Unknown'),'system');
          }
          else{
            dlog('Unknown message type: '+data.type);
          }
        }catch(e){
          dlog('Parse error: '+e.message);
        }
      });

      client.on('error',(e)=>{
        dlog('MQTT error: '+e.message);
        document.getElementById('statusDot').style.background='#ff4444';
        document.getElementById('statusText').textContent='Error';
      });

      client.on('close',()=>{
        dlog('MQTT disconnected');
        document.getElementById('statusDot').style.background='#ff9800';
        document.getElementById('statusText').textContent='Disconnected';
      });

      client.on('reconnect',()=>{
        dlog('Reconnecting...');
        document.getElementById('statusDot').style.background='#ff9800';
        document.getElementById('statusText').textContent='Reconnecting...';
      });
    }

    function sendMsg(){
      const input=document.getElementById('msgInput');
      const text=input.value.trim();
      if(!text||!client)return;
      input.value='';

      addMessage(text,'user');

      const payload={type:'chat', payload:{content:text}, ts:Date.now()};
      const topic=instanceId+'/'+deviceId+'/user';
      dlog('Publishing to '+topic+': '+JSON.stringify(payload));
      client.publish(topic, JSON.stringify(payload));
    }
  </script>
</body>
</html>
