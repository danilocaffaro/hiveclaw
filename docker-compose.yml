# docker-compose.yml — SuperClaw Pure
# Quick start: docker compose up -d
# Access: http://localhost:4070

services:
  superclaw:
    image: ghcr.io/danilocaffaro/superclaw-pure:latest
    # Or build locally: comment out 'image' and uncomment 'build'
    # build: .
    container_name: superclaw-pure
    restart: unless-stopped
    ports:
      - "4070:4070"
    volumes:
      - superclaw-data:/data
      - superclaw-workspace:/workspace
    environment:
      - NODE_ENV=production
      - PORT=4070
      - SUPERCLAW_DB_PATH=/data/superclaw.db
      - SUPERCLAW_WORKSPACE=/workspace
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4070/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  superclaw-data:
  superclaw-workspace:
