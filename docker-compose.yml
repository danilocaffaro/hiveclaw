# docker-compose.yml — HiveClaw v1.3
# Quick start: docker compose up -d
# Access: http://localhost:4070

services:
  hiveclaw:
    image: ghcr.io/danilocaffaro/hiveclaw:latest
    # Or build locally: comment out 'image' and uncomment 'build'
    # build: .
    container_name: hiveclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:4070:4070"
    volumes:
      - hiveclaw-data:/data
      - hiveclaw-workspace:/workspace
      - hiveclaw-canvas:/canvas
      - hiveclaw-whatsapp:/whatsapp
    environment:
      - NODE_ENV=production
      - HIVECLAW_PORT=4070
      - HIVECLAW_DB_PATH=/data/hiveclaw.db
      - HIVECLAW_WORKSPACE=/workspace
      - HIVECLAW_CANVAS_DIR=/canvas

      # ── LLM Providers (at least one required) ──
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OLLAMA_BASE_URL=http://host.docker.internal:11434

      # ── Channel Adapters (all optional) ──
      # - TELEGRAM_BOT_TOKEN=123456:ABC...
      # - DISCORD_BOT_TOKEN=MTI...
      # - SLACK_BOT_TOKEN=xoxb-...
      # - SLACK_SIGNING_SECRET=...
      # - SLACK_APP_TOKEN=xapp-...

      # ── Web Search (optional, pick one) ──
      # - BRAVE_API_KEY=BSA...
      # - SERPER_API_KEY=...
      # - TAVILY_API_KEY=tvly-...
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4070/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hiveclaw-data:
  hiveclaw-workspace:
  hiveclaw-canvas:
  hiveclaw-whatsapp:
